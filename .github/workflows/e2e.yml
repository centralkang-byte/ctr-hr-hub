name: E2E Tests

# Full Playwright E2E suite — gates main branch push/PR.
# Manual trigger: workflow_dispatch (gh workflow run e2e.yml --ref <branch>).
#
# Why Node 24 instead of 20: npm 10 (shipped with Node 20) strict-enforces
# the optional peer-dep `@swc/helpers >=0.5.17` from a sibling Next package
# and fails `npm ci` with "Missing @swc/helpers@0.5.21", while next@15.5.12
# exact-pins @swc/helpers@0.5.15. npm 11 (Node 24 LTS) honors the exact pin
# and resolves cleanly. visual-baseline.yml + e2e-api-phase6a.yml already
# use Node 24 for the same reason — this workflow is the last holdout.
#
# All `run:` commands below use static strings only — no github.event.*
# interpolation, so no injection surface.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        # pgvector image (Postgres 16 + pgvector extension) — schema declares
        # `extensions = [vector]` and uses Unsupported("vector(1536)"), so the
        # stock postgres:16 image cannot satisfy `prisma db push --force-reset`.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ctr_hr_hub_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/ctr_hr_hub_test
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: ci-test-secret-key-for-e2e
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      PLAYWRIGHT_BASE_URL: http://localhost:3002
      NEXT_PUBLIC_SHOW_TEST_ACCOUNTS: 'true'
      # Dummy Azure AD env vars — required by src/lib/env.ts getRequired()
      # when NODE_ENV=production, which `next build` internally sets even
      # though NODE_ENV: test is declared above. E2E tests log in via the
      # credentials provider so real Azure SSO is never invoked.
      AZURE_AD_CLIENT_ID: ci-test-azure-client-id
      AZURE_AD_CLIENT_SECRET: ci-test-azure-client-secret
      AZURE_AD_TENANT_ID: ci-test-azure-tenant-id

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # See file header comment for the Node 24 / npm 11 rationale.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --force-reset

      - name: Seed test data
        run: npx tsx prisma/seed.ts

      - name: Seed QA accounts (workaround — see scripts/seed-qa-accounts.ts)
        # The master seed (prisma/seed.ts) does not call seedQAAccounts, so
        # super@/hr@/manager@/employee-* SsoIdentity rows are missing and the
        # credentials provider login in e2e/global-setup.ts fails. This wrapper
        # injects them before Playwright runs.
        run: npx tsx scripts/seed-qa-accounts.ts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: test-results/
          retention-days: 7
